<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkillForge Course</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="navbar">

<div class="logo">
🎓 SkillForge Academy
</div>

<button id="logoutBtn" class="btn">
Logout
</button>

</header>

<section class="course-page">

<div class="sidebar">

<h2 id="courseTitle">
Loading Course...
</h2>

<div id="progressContainer">

<p>Course Progress</p>

<progress
id="progressBar"
value="0"
max="100">
</progress>

<p id="progressText">
0%
</p>

</div>

<hr>

<div id="lessonList">

Loading lessons...

</div>

</div>

<div class="lesson-content">

<h2 id="lessonTitle">
Choose a lesson
</h2>

<video
id="lessonVideo"
controls
width="100%"
style="display:none;">
</video>

<p id="lessonDescription"></p>

<a
id="pdfDownload"
class="btn"
target="_blank"
style="display:none;">
Download Lesson PDF
</a>

<br><br>

<button
id="completeLessonBtn"
class="btn"
style="display:none;">

Mark Lesson Complete

</button>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script type="module" src="js/course.js"></script>

</body>
</html>
